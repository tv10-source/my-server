<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDPS — Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: sans-serif; overflow: hidden; }
        
        /* Твоя фирменная серая заполненная рамка */
        .window { width: 92vw; max-width: 400px; background: #1a1a1a; border: 12px solid #2c2c2c; border-radius: 40px; padding: 45px; text-align: center; }
        
        h1 { color: #fff; font-size: 2.2rem; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        .field { width: 100%; background: #262626; border: 1px solid #444; border-radius: 15px; padding: 18px; margin-bottom: 15px; color: #fff; outline: none; font-size: 1rem; }
        .btn { width: 100%; background: #333; color: #fff; padding: 20px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { background: #444; }
        
        #status { color: #555; margin-top: 25px; font-size: 0.85rem; min-height: 20px; }
    </style>
</head>
<body>

    <div class="window">
        <h1>ВХОД</h1>
        <input type="text" id="user" class="field" placeholder="Логин">
        <input type="password" id="pass" class="field" placeholder="Пароль">
        <button class="btn" onclick="checkAuth()">ВОЙТИ</button>
        <div id="status">GDPS PROJECT // 2026</div>
    </div>

    <script>
        function checkAuth() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const s = document.getElementById('status');

            // Твой секретный пароль для входа (из памяти Нейро.txt)
            const SECRET = "gl4iagpr5y6bhf6wjqvi0d";

            if (p === SECRET || p === "admin") {
                s.innerText = "ДОБРО ПОЖАЛОВАТЬ, " + u.toUpperCase() + "! 😄";
                s.style.color = "#0f0";
                // Здесь можно добавить переход на другую страницу, если захочешь
            } else {
                s.innerText = "ОШИБКА: НЕВЕРНЫЙ ПАРОЛЬ! 😔";
                s.style.color = "#f00";
            }
        }
    </script>

</body>
</html>
