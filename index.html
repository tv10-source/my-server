<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDPS — Главная</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Твоя фирменная серая рамка */
        .window { 
            width: 92vw; 
            max-width: 450px; 
            background: #1a1a1a; 
            border: 12px solid #2c2c2c; 
            border-radius: 40px; 
            padding: 35px; 
            text-align: center; 
            margin-bottom: 20px; 
        }
        
        h1 { font-size: 1.8rem; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        .field { width: 100%; background: #262626; border: 1px solid #444; border-radius: 15px; padding: 15px; margin-bottom: 12px; color: #fff; outline: none; }
        .btn { width: 100%; background: #333; color: #fff; padding: 18px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        
        /* Стили для списка уровней, который вставит робот */
        .levels-list { text-align: left; color: #aaa; font-family: monospace; font-size: 0.9rem; line-height: 1.6; }
        
        .footer { margin-top: 20px; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

    <!-- БЛОК ВХОДА -->
    <div class="window">
        <h1>АВТОРИЗАЦИЯ</h1>
        <input type="text" class="field" placeholder="Имя пользователя">
        <input type="password" class="field" placeholder="Пароль">
        <button class="btn" onclick="alert('Система GDPS готова! ☺️')">ВОЙТИ</button>
    </div>

    <!-- БЛОК УРОВНЕЙ -->
    <div class="window">
        <h1>НОВЫЕ УРОВНИ</h1>
        <div class="levels-list">
            <!-- LEVELS_START -->
            Здесь скоро появятся уровни... ☺️
            <!-- LEVELS_END -->
        </div>
        <p style="margin-top: 20px; color: #666; font-size: 0.9rem;">Игроков на сервере: 30 🚀</p>
    </div>

    <div class="footer">GDPS PROJECT // 2026</div>

</body>
</html>
