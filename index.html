<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDPS Auth</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #000; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Segoe UI', Arial, sans-serif; 
        }

        .auth-window {
            width: 90vw; 
            max-width: 400px;
            background-color: #1a1a1a; 
            border: 12px solid #2c2c2c; 
            border-radius: 40px;
            padding: 40px;
            text-align: center;
        }

        h1 { color: #fff; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        .field { 
            width: 100%; 
            background-color: #262626; 
            border: 1px solid #444; 
            border-radius: 15px; 
            padding: 15px; 
            margin-bottom: 15px; 
            color: #fff; 
            outline: none; 
            font-size: 1rem;
        }

        .login-btn { 
            width: 100%; 
            background-color: #333; 
            color: #fff; 
            padding: 18px; 
            border-radius: 15px; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1rem;
            margin-top: 10px;
            transition: 0.2s;
        }

        .login-btn:hover { background-color: #444; }

        .status-msg { color: #555; margin-top: 25px; font-size: 0.85rem; min-height: 20px; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="auth-window">
        <h1>АВТОРИЗАЦИЯ</h1>
        
        <input type="text" id="username" class="field" placeholder="Имя пользователя">
        <input type="password" id="password" class="field" placeholder="Пароль">
        
        <button class="login-btn" onclick="tryLogin()">ВОЙТИ</button>

        <div id="status" class="status-msg">GDPS SERVER ACCESS // 2026</div>
    </div>

    <script>
        function tryLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const status = document.getElementById('status');

            if (!user || !pass) {
                status.innerText = "Заполни все поля! 🤔";
                status.style.color = "#888";
                return;
            }

            status.innerText = "Проверка в базе... ☺️";
            status.style.color = "#aaa";

            // Отправляем данные на сервер
            fetch('bot_logic.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`
            })
            .then(res => res.text())
            .then(data => {
                if (data.trim() === "SUCCESS") {
                    status.innerText = "Вход выполнен! 😄";
                    status.style.color = "#0f0";
                    // Здесь можно сделать переход: window.location.href = "welcome.html";
                } else {
                    status.innerText = "Ошибка: неверные данные! 😔";
                    status.style.color = "#f00";
                }
            })
            .catch(() => {
                status.innerText = "Ошибка связи с сервером 😢";
                status.style.color = "#f00";
            });
        }
    </script>
</body>
</html>
